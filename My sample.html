<!DOCTYPE html>
<html>
<head>
    <title>Little Lemon Restaurant</title>
    <link href="bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-12 text-center">
                <img src="logo.png" class="img-fluid" id="logo1">
            </div>
        </div>
        <div class="row">
            <div class="col-12 text-center">
                <h1 id="menu">Here's Our Menu</h1>
                <div class="alert alert-info" role="alert">
                    Our restaurant will be closed on New Year's Day
                </div>
            </div>
        </div>
        <form id="orderForm">
            <div class="row">
                <div class="col-12 col-lg-6">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Falafel" id="item1">
                        <label class="form-check-label" for="item1">
                            <h2>Falafel <span class="badge bg-secondary">New</span></h2>
                            <p>Chickpea, herbs, spices.</p>
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Fried Calamari" id="item2">
                        <label class="form-check-label" for="item2">
                            <h2>Fried Calamari</h2>
                            <p>Squid, buttermilk.</p>
                        </label>
                    </div>
                </div>
                <div class="col-12 col-lg-6">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Pasta Salad" id="item3">
                        <label class="form-check-label" for="item3">
                            <h2>Pasta Salad</h2>
                            <p>Lettuce, vegetables, mozzarella.</p>
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Greek Salad" id="item4">
                        <label class="form-check-label" for="item4">
                            <h2>Greek Salad</h2>
                            <p>Cucumbers, onion, feta cheese.</p>
                        </label>
                    </div>
                </div>
            </div>
            <div class="row mt-4">
                <div class="col-12 text-center">
                    <button type="button" class="btn btn-primary" onclick="proceedToOrder()">Order Online</button>
                </div>
            </div>
        </form>
    </div>
    <script>
         function proceedToOrder() {
        const selectedItems = [];
        const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
        checkboxes.forEach(cb => selectedItems.push(cb.value));

        const thankYouMsg = document.getElementById("thankYouMsg");

        if (selectedItems.length === 0) {
            alert("Please select at least one item to order.");
            thankYouMsg.style.display = "none";
        } else {
            alert("Thank You, enjoy your Meal");
            thankYouMsg.style.display = "block";
        }
    }
    </script>

    <script src="bootstrap.bundle.min.js"></script>
</body>
</html>
